<!-- {{rooms | json}} -->
<app-header></app-header>
<h3>{{downloadedBytes}} Bytes Loaded</h3>
<h3>
    {{getError$ | async}}
    <!-- Rooms Count: {{roomLength$ | async}} -->
</h3>
<!-- @if(showRooms && (rooms$ | async); as rooms){ -->
@if(showRooms && (getRooms$ | async); as rooms){
    <div>
    <!-- <app-rooms-list
        [rooms]="rooms"
        [title]="title"
        (selectedRoom)="displaySelectedRoom($event)"
    >
    </app-rooms-list> -->
    <app-rooms-list
        [rooms]="rooms"
        [title]="title"
        (selectedRoom)="navigateToRoute($event)"
    >
    </app-rooms-list>
    <button
        (click)="addRoom()"
    >
        Add Room
    </button>
    <button
        (click)="updateRoom()"
    >
        Update Room
    </button>
    <button
        (click)="deleteRoom()"
    >
        Delete Room
    </button>
    </div>
}
@if(selectedRoom){
    <div>
        {{selectedRoom| json}}
    </div>
}
<button (click)="toggle()" [ngStyle]="{'color': showRooms? 'steelblue': 'tomato'}">
    {{!showRooms?'Show Rooms': 'Nakko'}}
</button>
