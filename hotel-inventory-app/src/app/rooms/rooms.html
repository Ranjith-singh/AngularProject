<!-- {{rooms | json}} -->
<app-header></app-header>
@if(showRooms){
    <div>
    <app-rooms-list
        [rooms]="rooms"
        [title]="title"
        (selectedRoom)="displaySelectedRoom($event)"
    >
    </app-rooms-list>
    <button
        (click)="addRoom()"
    >
        Add Room
    </button>
    </div>
}
@if(selectedRoom){
    <div>
        {{selectedRoom| json}}
    </div>
}
<button (click)="toggle()" [ngStyle]="{'color': showRooms? 'steelblue': 'tomato'}">
    {{!showRooms?'Show Rooms': 'Nakko'}}
</button>
